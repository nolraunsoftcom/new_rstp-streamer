name: CI

on:
  push:
    branches: [main, m2b-performance]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # macOS — Homebrew FFmpeg + Qt6, pkg-config 경로
  # ──────────────────────────────────────────────
  build-macos:
    name: macOS (Homebrew FFmpeg + Qt 6.8 LTS)
    runs-on: macos-14   # Apple Silicon (arm64) — Qt clang_64는 universal2

    steps:
      - uses: actions/checkout@v4

      # FFmpeg/pkg-config만 brew. Qt는 Windows와 동일하게 6.8 LTS(aqtinstall)로 핀.
      - name: Install FFmpeg (brew)
        run: |
          brew update
          brew install ffmpeg pkg-config

      - name: Install Qt6 via aqtinstall (6.8 LTS — Windows와 버전 통일)
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          host: mac
          target: desktop
          arch: clang_64
          modules: qtshadertools
          cache: true

      - name: Configure (CMake)
        run: |
          cmake -B build -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$Qt6_DIR;/opt/homebrew" \
            -DCMAKE_POLICY_DEFAULT_CMP0167=NEW

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Unit tests (no integration)
        run: ctest --test-dir build -LE integration --output-on-failure

      # GPL-absence check: vcpkg.json must not declare any GPL features (x264/x265/etc.)
      - name: Verify GPL-free (vcpkg.json)
        run: |
          echo "=== GPL-free check ==="
          if grep -Ei '"(x264|x265|openssl|gpl)"' vcpkg.json; then
            echo "FAIL: GPL-enabling feature found in vcpkg.json" >&2
            exit 1
          fi
          echo "PASS: no GPL features in vcpkg.json"

      # Integration tests (mediamtx download) — failures don't block the job
      - name: Download mediamtx (integration prerequisite)
        continue-on-error: true
        run: bash ops/mediamtx/download.sh

      - name: Integration tests
        continue-on-error: true
        run: ctest --test-dir build -L integration --output-on-failure

  # ──────────────────────────────────────────────
  # Windows — vcpkg FFmpeg (dynamic/GPL-free) + Qt via aqtinstall
  # best-effort: 이 세션에서 Windows 실환경 미검증 (보고서 참조)
  # ──────────────────────────────────────────────
  build-windows:
    name: Windows (vcpkg FFmpeg + Qt6)
    runs-on: windows-2022

    env:
      VCPKG_ROOT: C:\vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}\vcpkg-bincache

    steps:
      - uses: actions/checkout@v4

      # FFmpeg 빌드 결과(.zip)를 CI 실행 간 보존 — 2회차부터 19분 재빌드 생략
      - name: vcpkg binary cache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}\vcpkg-bincache
          key: vcpkg-win-${{ hashFiles('vcpkg.json') }}
          restore-keys: vcpkg-win-

      - name: Ensure vcpkg cache dir
        run: New-Item -ItemType Directory -Force -Path "$env:VCPKG_DEFAULT_BINARY_CACHE" | Out-Null
        shell: pwsh

      - name: Set up vcpkg
        # vcpkg.json builtin-baseline(2026.06.01)과 동일 커밋으로 핀 — baseline 로드/버전 정합
        run: |
          git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          cd /d C:\vcpkg
          git checkout f3e10653cc27d62a37a3763cd84b38bca07c6075
          C:\vcpkg\bootstrap-vcpkg.bat -disableMetrics
        shell: cmd

      - name: Install Qt6 via aqtinstall
        uses: jurplel/install-qt-action@v4
        with:
          # Qt 6.8 LTS (2029.10까지 지원). '6.8.*' = aqt 오픈소스 저장소의 최신 6.8 패치 자동 선택
          # (6.8.6/6.8.7은 상용 전용이라 aqt 미제공 → 최신 오픈소스 패치로 해소).
          version: '6.8.*'
          host: windows
          target: desktop
          # Qt 6.8부터 win64_msvc2022_64 (VS2022 네이티브 툴체인).
          arch: win64_msvc2022_64
          # ShaderTools(qsb) — CMake가 find_package(Qt6 ... ShaderTools) 필수. base 미포함 애드온.
          modules: qtshadertools
          cache: true

      # 진단: aqt Qt 설치에 GuiPrivate(QRhi/rhi 헤더) cmake 설정이 실제 있는지 확인.
      # configure(=vcpkg FFmpeg 빌드 19분) 전에 실행되어 빠르게 결과 확인 가능.
      - name: Diagnose Qt private modules
        run: |
          Write-Host "Qt6_DIR    = $env:Qt6_DIR"
          Write-Host "QT_ROOT_DIR= $env:QT_ROOT_DIR"
          $cmakeDir = Join-Path $env:QT_ROOT_DIR 'lib\cmake'
          Write-Host "=== lib\cmake 내 *Private* 패키지 ==="
          Get-ChildItem $cmakeDir -Directory -Filter '*Private*' -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Name
          $gp = Join-Path $cmakeDir 'Qt6GuiPrivate\Qt6GuiPrivateConfig.cmake'
          Write-Host "Qt6GuiPrivateConfig.cmake exists = $(Test-Path $gp)"
          Write-Host "=== rhi 헤더 존재 확인 ==="
          Get-ChildItem (Join-Path $env:QT_ROOT_DIR 'include\QtGui') -Recurse -Filter 'qrhi.h' -ErrorAction SilentlyContinue | Select-Object -ExpandProperty FullName
        shell: pwsh

      - name: Configure (CMake + vcpkg toolchain)
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="C:\vcpkg\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DCMAKE_PREFIX_PATH="$env:Qt6_DIR"
        shell: pwsh

      - name: Build
        run: cmake --build build --config Release -j $env:NUMBER_OF_PROCESSORS
        shell: pwsh

      - name: Unit tests (no integration)
        run: ctest --test-dir build -C Release -LE integration --output-on-failure
        shell: pwsh

      # GPL-absence check on Windows (same logic as macOS)
      - name: Verify GPL-free (vcpkg.json)
        run: |
          $content = Get-Content vcpkg.json -Raw
          if ($content -match '"(x264|x265|openssl|gpl)"') {
            Write-Error "FAIL: GPL-enabling feature found in vcpkg.json"
            exit 1
          }
          Write-Host "PASS: no GPL features in vcpkg.json"
        shell: pwsh
